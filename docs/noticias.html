<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Academic Brain — Boletines</title>
<link rel="icon" href="logo.webp" type="image/webp" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,800;1,6..72,400;1,6..72,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf7f0;
    --panel: #f2ede1;
    --line: #ddd5c5;
    --ink: #17130f;
    --muted: #6b6459;
    --accent: #14655a;
    --amber: #a06d1a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Newsreader', Georgia, serif;
    background: var(--paper);
    color: var(--ink);
  }
  a { color: var(--accent); }
  #app { display: flex; min-height: 100vh; }

  /* ---- Sidebar ---- */
  #sidebar {
    width: 300px; min-width: 300px;
    background: var(--panel);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 18px 16px 40px;
  }
  .brand { padding-bottom: 14px; border-bottom: 1px solid var(--line); margin-bottom: 14px; }
  .brand a.back {
    display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px;
    letter-spacing: .04em; color: var(--muted); text-decoration: none; margin-bottom: 8px;
  }
  .brand a.back:hover { color: var(--accent); }
  .brand h1 { font-size: 19px; margin: 0 0 3px; font-weight: 800; }
  .brand p { margin: 0; font-size: 12px; color: var(--muted); font-family: 'Newsreader', serif; font-style: italic; }

  .coll { margin-bottom: 20px; }
  .coll-hdr {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--accent); margin: 0 0 8px; font-weight: 600;
  }
  .entry-btn {
    display: block; width: 100%; text-align: left; background: none; border: none;
    border-left: 2px solid transparent; padding: 7px 10px; margin-bottom: 2px;
    cursor: pointer; font-family: 'Newsreader', serif; border-radius: 0 4px 4px 0;
  }
  .entry-btn:hover { background: #e9e2d2; }
  .entry-btn.active { border-left-color: var(--accent); background: #e9e2d2; }
  .entry-date {
    display: block; font-family: 'IBM Plex Mono', monospace; font-size: 9.5px;
    color: var(--muted); letter-spacing: .04em; margin-bottom: 2px;
  }
  .entry-title { display: block; font-size: 13.5px; line-height: 1.3; color: var(--ink); }
  .empty-msg { font-size: 12.5px; color: var(--muted); font-style: italic; padding: 4px 10px; }

  /* ---- Main / article ---- */
  #main { flex: 1; overflow-y: auto; }
  #article-wrap { max-width: 720px; margin: 0 auto; padding: 44px 32px 80px; }
  .meta-bar {
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px;
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted); border-bottom: 2px solid var(--ink);
    padding-bottom: 8px; margin-bottom: 18px;
  }
  .meta-bar b { color: var(--accent); }
  #article h1.doc-title {
    font-weight: 800; font-size: 38px; line-height: 1.05; letter-spacing: -0.01em; margin: 0 0 22px;
  }
  #article h2 {
    font-weight: 800; font-size: 23px; line-height: 1.15; margin: 30px 0 10px;
    border-bottom: 1px solid var(--line); padding-bottom: 5px;
  }
  #article p { font-size: 16px; line-height: 1.65; margin: 0 0 14px; text-wrap: pretty; }
  #article p.ref-line, #article ul.ref-list li {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent);
    line-height: 1.5; border-left: 2px solid var(--accent); padding-left: 9px; margin: -6px 0 12px;
    list-style: none;
  }
  #article ul.ref-list { padding: 0; margin: 0 0 12px; }
  #article ul:not(.ref-list) { padding-left: 22px; margin: 0 0 14px; }
  #article blockquote {
    margin: 0 0 18px; padding: 10px 16px; background: var(--panel);
    border-left: 3px solid var(--accent); font-style: italic; color: #3c362b;
  }
  #article blockquote p { margin: 0; font-size: 15.5px; }
  #article hr { border: none; border-top: 1px solid var(--line); margin: 26px 0; }
  #article code {
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; background: var(--panel);
    padding: 1px 5px; border-radius: 3px;
  }
  #article a.internal-link { border-bottom: 1px dotted var(--accent); }
  .placeholder { color: var(--muted); font-style: italic; padding: 60px 0; text-align: center; }

  @media (max-width: 760px) {
    #app { flex-direction: column; }
    #sidebar { width: auto; min-width: 0; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--line); }
    #article-wrap { padding: 28px 18px 60px; }
    #article h1.doc-title { font-size: 28px; }
  }
  @media print {
    #sidebar { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="brand">
      <a class="back" href="index.html">← Volver al grafo</a>
      <h1>Boletines</h1>
      <p>Noticias del second brain, por fecha</p>
    </div>
    <div id="coll-list"></div>
  </nav>
  <main id="main">
    <div id="article-wrap">
      <div id="article"><div class="placeholder">Selecciona un boletín en la izquierda.</div></div>
    </div>
  </main>
</div>

<script src="noticias-data.js"></script>
<script>
(function () {
  const data = window.__NOTICIAS__ || { collections: [] };
  const byId = new Map();
  for (const coll of data.collections) {
    for (const entry of coll.entries) byId.set(entry.id, entry);
  }

  const collListEl = document.getElementById("coll-list");
  const articleEl = document.getElementById("article");

  function renderSidebar(activeId) {
    collListEl.innerHTML = "";
    for (const coll of data.collections) {
      const section = document.createElement("div");
      section.className = "coll";
      const hdr = document.createElement("div");
      hdr.className = "coll-hdr";
      hdr.textContent = coll.label;
      section.appendChild(hdr);

      if (!coll.entries.length) {
        const empty = document.createElement("div");
        empty.className = "empty-msg";
        empty.textContent = "Sin entradas por ahora.";
        section.appendChild(empty);
      }

      for (const entry of coll.entries) {
        const btn = document.createElement("button");
        btn.className = "entry-btn" + (entry.id === activeId ? " active" : "");
        btn.dataset.id = entry.id;
        btn.innerHTML =
          '<span class="entry-date">' + (entry.dateLabel || "sin fecha") + "</span>" +
          '<span class="entry-title">' + entry.title + "</span>";
        btn.addEventListener("click", () => selectEntry(entry.id, true));
        section.appendChild(btn);
      }
      collListEl.appendChild(section);
    }
  }

  function renderArticle(entry) {
    if (!entry) {
      articleEl.innerHTML = '<div class="placeholder">Selecciona un boletín en la izquierda.</div>';
      return;
    }
    articleEl.innerHTML =
      '<div class="meta-bar"><span>' + entry.id.split("/")[0] + "</span>" +
      "<span><b>" + (entry.dateLabel || "sin fecha") + "</b></span></div>" +
      '<h1 class="doc-title">' + entry.title + "</h1>" +
      entry.html;

    // navegación interna entre boletines (enlaces "hilo abierto" / referencias cruzadas)
    articleEl.querySelectorAll("[data-goto]").forEach((a) => {
      a.addEventListener("click", (ev) => {
        ev.preventDefault();
        selectEntry(a.dataset.goto, true);
      });
    });
  }

  function selectEntry(id, push) {
    const entry = byId.get(id);
    renderArticle(entry);
    renderSidebar(id);
    if (push) location.hash = id;
    document.getElementById("main").scrollTop = 0;
  }

  function mostRecentId() {
    let best = null;
    for (const coll of data.collections) {
      for (const entry of coll.entries) {
        if (!best || (entry.date || "") > (best.date || "")) best = entry;
      }
    }
    return best ? best.id : null;
  }

  window.addEventListener("hashchange", () => {
    const id = decodeURIComponent(location.hash.slice(1));
    if (id && byId.has(id)) selectEntry(id, false);
  });

  const initial = decodeURIComponent(location.hash.slice(1));
  const startId = initial && byId.has(initial) ? initial : mostRecentId();
  renderSidebar(startId);
  renderArticle(startId ? byId.get(startId) : null);
})();
</script>
</body>
</html>
